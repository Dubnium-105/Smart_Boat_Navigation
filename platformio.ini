; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32-s3-devkitm-1

[env:esp32-s3-devkitm-1]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino
upload_speed = 2000000
monitor_speed = 115200
monitor_port = COM3
board_build.partitions = huge_app.csv
board_build.f_flash = 80000000L
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
lib_deps = 
	espressif/esp32-camera@^2.0.4
	knolleary/PubSubClient@^2.8
	bblanchon/ArduinoJson@^7.4.1
	z3t0/IRremote@^4.4.2
build_flags = 
	-DBOARD_HAS_PSRAM
	-Iinclude
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
	-DNETWORK_4G_MODULE_TEST=1
	-DCELLULAR_UART_RX_PIN=1
	-DCELLULAR_UART_TX_PIN=2
	; For breakout boards that only expose RST/RDY, wire and enable these first:
	-DCELLULAR_RESET_PIN=42
	; -DCELLULAR_RESET_ACTIVE_LEVEL=0
	; -DCELLULAR_RESET_PULSE_MS=180
	-DCELLULAR_STATUS_PIN=41
	; -DCELLULAR_STATUS_ACTIVE_LEVEL=1
	; Enable PWRKEY only if your board actually exposes it:
	; -DCELLULAR_PWRKEY_PIN=14
	; -DCELLULAR_PWRKEY_ACTIVE_LEVEL=0
	; -DCELLULAR_PWRKEY_PULSE_MS=1200
	-DCONFIG_WIFI_DYNAMIC_TX_BUFFER_NUM=32
	-DCONFIG_WIFI_DYNAMIC_RX_BUFFER_NUM=3
	-DCONFIG_ESP_INT_WDT_TIMEOUT_MS=1000
	-DCONFIG_ESP_TASK_WDT_TIMEOUT_S=10
	-DCONFIG_SPIRAM_CACHE_WORKAROUND
	-DCONFIG_FREERTOS_HZ=1000
board_upload.flash_size = 16MB
board_build.filesystem = spiffs
debug_tool = esp-builtin
